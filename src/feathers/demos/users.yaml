service:
  name: hello_users
  description: User management demo
  python: "3.12"

models:
  - name: User
    soft_delete: true
    audit: true
    fields:
      - { name: id, type: uuid, primary: true }
      - { name: email, type: str, unique: true, indexed: true, max_length: 255 }
      - { name: full_name, type: str, max_length: 100 }
      - { name: role, type: enum, values: [admin, editor, viewer], default: viewer }
      - { name: created_at, type: datetime, default: now }

endpoints:
  - { method: POST,   path: "/users",       handler: users.create,  auth: admin }
  - { method: GET,    path: "/users/{id}",  handler: users.get,     auth: any }
  - { method: GET,    path: "/users",       handler: users.list,    auth: any, paginate: cursor }
  - { method: PATCH,  path: "/users/{id}",  handler: users.update,  auth: admin }
  - { method: DELETE, path: "/users/{id}",  handler: users.delete,  auth: admin }

observability:
  metrics: prometheus
  tracing: otel
  logging: structlog

deploy:
  target: render
  health: /health
